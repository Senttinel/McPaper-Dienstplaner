<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McPaper Dienstplaner---Von Kasimir</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --mcp-red: #e30613;
            --mcp-blue: #00305d;
            --mcp-white: #ffffff;
            --mcp-bg: #f0f2f5;
        }

        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--mcp-bg); padding: 20px; color: #333; }
        .app-card { background: var(--mcp-white); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 1450px; margin: auto; }
        
        header { background: var(--mcp-red); padding: 20px; margin: -25px -25px 25px -25px; border-radius: 15px 15px 0 0; text-align: center; color: white; }
        h2 { margin: 0; text-transform: uppercase; font-size: 1.5rem; letter-spacing: 2px; }

        .date-picker-area { margin-bottom: 20px; display: flex; gap: 15px; align-items: center; padding: 10px; background: #fff; border-radius: 8px; font-weight: bold;}
        .date-input { border: 2px solid #ddd; padding: 8px; border-radius: 6px; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 3px solid var(--mcp-blue); background: #fff; }
        th { background: var(--mcp-blue); color: white; padding: 12px; font-size: 14px; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: top; background: white; transition: background 0.3s; }
        
        td.is-off { background: #f2f2f2 !important; }

        .name-cell { position: relative; padding-top: 25px !important; }
        .config-btn { position: absolute; top: 5px; right: 5px; cursor: pointer; font-size: 16px; color: #999; border: none; background: none; }
        .name-input { font-weight: bold; width: 90%; border: 1px solid #ccc; padding: 8px; font-size: 14px; border-radius: 4px; }
        .stunden-info { font-size: 11px; margin-top: 5px; color: #666; font-weight: bold; }
        .status-green { color: #28a745; }
        .status-red { color: #e30613; }
        
        .day-container { display: grid; grid-template-columns: 1fr; gap: 6px; align-items: center; width: 100%; }
        .time-wrapper { display: flex; justify-content: center; align-items: center; gap: 2px; width: 100%; }
        .time-input { width: 45%; max-width: 60px; font-size: 13px; border: 1px solid #bbb; border-radius: 5px; padding: 5px; text-align: center; }
        
        .filiale-select { width: 100%; font-size: 12px; padding: 6px; border: 1px solid #ddd; border-radius: 5px; font-weight: bold; color: var(--mcp-blue); }
        .off-btn { background: #eee; border: 1px solid #ccc; border-radius: 4px; font-size: 10px; padding: 4px 8px; cursor: pointer; text-transform: uppercase; font-weight: bold; color: #666; }

        .controls { display: flex; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        .btn-add { background: var(--mcp-blue); }
        .btn-new { background: #28a745; }
        .btn-export { background: var(--mcp-red); }

        /* EXPORT-ONLY STYLES */
        .export-header-title { font-size: 24px; font-weight: bold; color: var(--mcp-blue); margin-bottom: 20px; text-align: center; display: block; }
        .export-display-cell { vertical-align: middle !important; padding: 12px 6px !important; }
        .export-display-container { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 100%; }
        .export-display-name { font-weight: bold; font-size: 16px; display: block; margin-top: 5px; text-align: left; padding: 8px; }
        .export-display-times { font-size: 14px; font-weight: bold; color: #222; margin-bottom: 3px; }
        .export-display-filiale { font-size: 11px; font-weight: bold; color: var(--mcp-blue); border: 1px solid var(--mcp-blue); border-radius: 3px; padding: 2px 4px; background: #fff; }
        .export-display-frei { font-size: 14px; font-weight: bold; color: #777; font-style: italic; }
        .export-display-hours { font-size: 11px; color: #666; font-weight: bold; margin-top: 5px;}

    </style>
</head>
<body>

<div id="config-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; padding: 25px; border-radius: 12px; width: 300px; text-align: center;">
        <h3 id="modal-name">Setup</h3>
        <p>Monatliche Soll-Stunden:</p>
        <input type="number" id="soll-stunden-input" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px;">
        <button class="btn btn-add" onclick="saveConfig()">Speichern</button>
        <button class="btn" style="background:#ccc; margin-top:10px" onclick="closeModal()">Abbrechen</button>
    </div>
</div>

<div class="app-card">
    <header><h2>McPaper Wochen-Dienstplan</h2></header>
    
    <div id="export-area">
        <div class="date-picker-area">
            📅 Zeitraum von: <input type="date" class="date-input" id="von-datum" onchange="saveData(); updateStundenAnzeige();"> 
            bis <input type="date" class="date-input" id="bis-datum" onchange="saveData(); updateStundenAnzeige();">
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 18%;">Mitarbeiter</th>
                    <th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th>
                    <th class="no-export"></th>
                </tr>
            </thead>
            <tbody id="plan-body"></tbody>
        </table>
    </div>

    <div class="controls">
        <button class="btn btn-add" onclick="neueZeile(); saveData();">➕ Person hinzufügen</button>
        <button class="btn btn-new" onclick="neuerDienstplan()">📅 Neuen Dienstplan erstellen</button>
        <button class="btn btn-export" id="btn-export" onclick="alsBildSpeichern()">🚀 Exportieren</button>
    </div>
</div>

<script>
    let currentEditingRow = null;

    window.onload = () => { loadData(); };

    function neueZeile(savedData = null) {
        const tbody = document.getElementById('plan-body');
        const tr = document.createElement('tr');
        
        let tageHTML = '';
        for(let i=0; i<6; i++) {
            tageHTML += `
                <td>
                    <div class="day-container">
                        <div class="time-wrapper">
                            <input type="text" class="time-input start-time" placeholder="von" maxlength="5" oninput="formatTime(this); updateStundenAnzeige();">
                            <span style="font-size:10px">-</span>
                            <input type="text" class="time-input end-time" placeholder="bis" maxlength="5" oninput="formatTime(this); updateStundenAnzeige();">
                        </div>
                        <select class="filiale-select" onchange="saveData()"><option value="">Filiale...</option><option value="F9212">F9212</option><option value="F9260">F9260</option><option value="FREI">FREI</option></select>
                        <button class="off-btn" onclick="toggleOff(this); saveData(); updateStundenAnzeige();">Frei</button>
                    </div>
                </td>`;
        }

        tr.innerHTML = `
            <td class="name-cell">
                <button class="config-btn" onclick="openConfig(this)">⚙️</button>
                <input type="text" class="name-input" placeholder="Name" oninput="saveData()">
                <div class="stunden-info">Std: <span class="ist-stunden">0</span> / <span class="soll-stunden">0</span></div>
            </td>
            ${tageHTML}
            <td class="no-export"><button style="background:none; border:none; color:red; cursor:pointer;" onclick="this.parentElement.parentElement.remove(); saveData();">✖</button></td>
        `;
        tbody.appendChild(tr);

        if(savedData) {
            tr.querySelector('.name-input').value = savedData.name;
            tr.querySelector('.soll-stunden').innerText = savedData.sollStunden || 0;
            const cells = tr.querySelectorAll('td:not(.name-cell):not(.no-export)');
            savedData.tage.forEach((tag, idx) => {
                const cell = cells[idx];
                cell.querySelector('.start-time').value = tag.start;
                cell.querySelector('.end-time').value = tag.end;
                cell.querySelector('.filiale-select').value = tag.filiale;
                if(tag.isOff) cell.classList.add('is-off');
            });
        }
        updateStundenAnzeige();
    }

    function openConfig(btn) {
        currentEditingRow = btn.closest('tr');
        document.getElementById('modal-name').innerText = currentEditingRow.querySelector('.name-input').value || "Mitarbeiter";
        document.getElementById('soll-stunden-input').value = currentEditingRow.querySelector('.soll-stunden').innerText;
        document.getElementById('config-modal').style.display = 'flex';
    }

    function saveConfig() {
        currentEditingRow.querySelector('.soll-stunden').innerText = document.getElementById('soll-stunden-input').value;
        closeModal();
        saveData();
        updateStundenAnzeige();
    }

    function closeModal() { document.getElementById('config-modal').style.display = 'none'; }

    function formatTime(input) {
        let val = input.value.replace(':', '');
        if (val.length >= 3) input.value = val.slice(0, 2) + ':' + val.slice(2, 4);
        else input.value = val;
        saveData();
    }

    function toggleOff(btn) {
        const cell = btn.closest('td');
        cell.classList.toggle('is-off');
        const sel = cell.querySelector('.filiale-select');
        if(cell.classList.contains('is-off')) {
            cell.querySelectorAll('input').forEach(i => i.value = "");
            sel.value = "FREI";
        } else {
            sel.value = "";
        }
    }

    function updateStundenAnzeige() {
        const rows = document.querySelectorAll('#plan-body tr');
        const vonVal = document.getElementById('von-datum').value;
        if(!vonVal) return;
        
        const history = JSON.parse(localStorage.getItem('mcp_hours_history') || "{}");
        const monthKey = new Date(vonVal).getMonth() + "-" + new Date(vonVal).getFullYear();

        rows.forEach(row => {
            let wochenStunden = 0;
            row.querySelectorAll('td:not(.name-cell):not(.no-export)').forEach(cell => {
                const s = cell.querySelector('.start-time').value;
                const e = cell.querySelector('.end-time').value;
                if(s.includes(':') && e.includes(':')) {
                    const [sH, sM] = s.split(':').map(Number);
                    const [eH, eM] = e.split(':').map(Number);
                    wochenStunden += (eH + eM/60) - (sH + sM/60);
                }
            });

            const name = row.querySelector('.name-input').value;
            const gesamt = Math.round(((history[name + "_" + monthKey] || 0) + wochenStunden) * 10) / 10;
            const soll = parseFloat(row.querySelector('.soll-stunden').innerText) || 0;
            
            const el = row.querySelector('.ist-stunden');
            el.innerText = gesamt;
            if(soll > 0) el.className = gesamt > soll ? 'ist-stunden status-red' : 'ist-stunden status-green';
            else el.className = 'ist-stunden';
        });
    }

    function saveData() {
        const rows = document.querySelectorAll('#plan-body tr');
        const data = { von: document.getElementById('von-datum').value, bis: document.getElementById('bis-datum').value, mitarbeiter: [] };
        rows.forEach(row => {
            const m = { name: row.querySelector('.name-input').value, sollStunden: row.querySelector('.soll-stunden').innerText, tage: [] };
            row.querySelectorAll('td:not(.name-cell):not(.no-export)').forEach(cell => {
                m.tage.push({ start: cell.querySelector('.start-time').value, end: cell.querySelector('.end-time').value, filiale: cell.querySelector('.filiale-select').value, isOff: cell.classList.contains('is-off') });
            });
            data.mitarbeiter.push(m);
        });
        localStorage.setItem('mcp_dienstplan_data', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('mcp_dienstplan_data');
        if(saved) {
            const data = JSON.parse(saved);
            document.getElementById('von-datum').value = data.von;
            document.getElementById('bis-datum').value = data.bis;
            data.mitarbeiter.forEach(m => neueZeile(m));
        } else {
            for(let i=0; i<6; i++) neueZeile();
            document.getElementById('von-datum').value = new Date().toISOString().split('T')[0];
        }
    }

    function neuerDienstplan() {
        if(!confirm("Stunden sichern und Plan leeren?")) return;
        const vonVal = document.getElementById('von-datum').value;
        const monthKey = new Date(vonVal).getMonth() + "-" + new Date(vonVal).getFullYear();
        const history = JSON.parse(localStorage.getItem('mcp_hours_history') || "{}");

        document.querySelectorAll('#plan-body tr').forEach(row => {
            const name = row.querySelector('.name-input').value;
            let wochenStunden = 0;
            row.querySelectorAll('td:not(.name-cell):not(.no-export)').forEach(cell => {
                const s = cell.querySelector('.start-time').value;
                const e = cell.querySelector('.end-time').value;
                if(s.includes(':') && e.includes(':')) {
                    const [sH, sM] = s.split(':').map(Number);
                    const [eH, eM] = e.split(':').map(Number);
                    wochenStunden += (eH + eM/60) - (sH + sM/60);
                }
            });
            if(name) history[name + "_" + monthKey] = (history[name + "_" + monthKey] || 0) + wochenStunden;
        });
        localStorage.setItem('mcp_hours_history', JSON.stringify(history));
        document.querySelectorAll('.time-input').forEach(i => i.value = "");
        document.querySelectorAll('.filiale-select').forEach(s => s.value = "");
        document.querySelectorAll('td').forEach(td => td.classList.remove('is-off'));
        saveData();
        updateStundenAnzeige();
    }

    function alsBildSpeichern() {
        const btnExport = document.getElementById('btn-export');
        btnExport.innerText = "Exportieren...";
        
        const originalArea = document.getElementById('export-area');
        const exportDouble = originalArea.cloneNode(true);
        exportDouble.id = 'export-double';
        
        const von = document.getElementById('von-datum').value;
        const bis = document.getElementById('bis-datum').value;
        const headerText = document.createElement('div');
        headerText.className = 'export-header-title';
        headerText.innerText = `Dienstplan vom ${von} bis ${bis}`;
        exportDouble.prepend(headerText);

        exportDouble.querySelectorAll('.no-export, .config-btn, .off-btn, .date-picker-area').forEach(e => e.style.display = 'none');
        
        const rowsOriginal = originalArea.querySelectorAll('#plan-body tr');
        rowsOriginal.forEach((rowOrig, rowIndex) => {
            const doubleRow = exportDouble.querySelector('#plan-body tr:nth-child('+(rowIndex+1)+')');
            
            const nameVal = rowOrig.querySelector('.name-input').value || "Name";
            const istStd = rowOrig.querySelector('.ist-stunden').innerText;
            const sollStd = rowOrig.querySelector('.soll-stunden').innerText;
            const nameCell = doubleRow.querySelector('.name-cell');
            nameCell.innerHTML = `<span class="export-display-name">${nameVal}</span><span class="export-display-hours">Std. Mo: ${istStd} / ${sollStd}</span>`;

            const cellsOriginal = rowOrig.querySelectorAll('td:not(.name-cell):not(.no-export)');
            cellsOriginal.forEach((cellOrig, cellIndex) => {
                const s = cellOrig.querySelector('.start-time').value;
                const e = cellOrig.querySelector('.end-time').value;
                const fil = cellOrig.querySelector('.filiale-select').value;
                const doubleTd = doubleRow.querySelectorAll('td:not(.name-cell):not(.no-export)')[cellIndex];
                doubleTd.className = 'export-display-cell';
                
                const container = document.createElement('div');
                container.className = 'export-display-container';
                
                // KORRIGIERTE LOGIK: Nur wenn explizit FREI gewählt ist
                if (cellOrig.classList.contains('is-off') || fil === 'FREI') {
                    doubleTd.style.backgroundColor = '#f2f2f2';
                    container.innerHTML = `<span class="export-display-frei">FREI</span>`;
                } else if (s && e && fil) {
                    container.innerHTML = `<span class="export-display-times">${s} - ${e}</span><span class="export-display-filiale">${fil}</span>`;
                }
                doubleTd.innerHTML = '';
                doubleTd.appendChild(container);
            });
        });
        
        exportDouble.style.position = 'absolute';
        exportDouble.style.left = '-9999px';
        exportDouble.style.width = '1450px';
        document.body.appendChild(exportDouble);
        
        html2canvas(exportDouble, { backgroundColor: "#ffffff", scale: 3 }).then(canvas => {
            document.body.removeChild(exportDouble);
            const link = document.createElement('a');
            link.download = `Plan_${von}_bis_${bis}.png`;
            link.href = canvas.toDataURL();
            link.click();
            btnExport.innerText = "🚀 Exportieren";
        });
    }
</script>
</body>
</html>
